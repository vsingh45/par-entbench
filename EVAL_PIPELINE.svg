<svg viewBox="0 0 1100 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill: #e3f2fd; stroke: #1976d2; stroke-width: 2; }
    .live { fill: #fff9c4; stroke: #f57f17; stroke-width: 2; }
    .eval { fill: #c8e6c9; stroke: #388e3c; stroke-width: 2; }
    .label { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; text-anchor: middle; }
    .detail { font-family: Arial, sans-serif; font-size: 11px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
  </defs>

  <text x="550" y="25" class="title">Execution-Based Evaluation Pipeline</text>

  <!-- Step 1 -->
  <rect x="10" y="60" width="110" height="80" rx="5" class="box"/>
  <text x="65" y="85" class="label">1. Task</text>
  <text x="65" y="105" class="detail">JSON def</text>
  <text x="65" y="120" class="detail">EntBench</text>

  <!-- Arrow -->
  <path d="M 120 100 L 150 100" class="arrow"/>

  <!-- Step 2 -->
  <rect x="150" y="60" width="110" height="80" rx="5" class="box"/>
  <text x="205" y="80" class="label">2. Plan</text>
  <text x="205" y="95" class="label">&amp; Route</text>
  <text x="205" y="120" class="detail">decompose,</text>
  <text x="205" y="133" class="detail">assign tier</text>

  <!-- Arrow -->
  <path d="M 260 100 L 290 100" class="arrow"/>

  <!-- Step 3 -->
  <rect x="290" y="60" width="110" height="80" rx="5" class="box"/>
  <text x="345" y="85" class="label">3. Execute</text>
  <text x="345" y="105" class="detail">specialist</text>
  <text x="345" y="120" class="detail">(Haiku,Sonnet,Opus)</text>

  <!-- Arrow -->
  <path d="M 400 100 L 430 100" class="arrow"/>

  <!-- Step 4 -->
  <rect x="430" y="60" width="110" height="80" rx="5" class="live"/>
  <text x="485" y="85" class="label">4. Hit DB</text>
  <text x="485" y="105" class="detail">execute on live</text>
  <text x="485" y="120" class="detail">Postgres/MongoDB</text>

  <!-- Arrow -->
  <path d="M 540 100 L 570 100" class="arrow"/>

  <!-- Step 5 -->
  <rect x="570" y="60" width="110" height="80" rx="5" class="eval"/>
  <text x="625" y="85" class="label">5. Evaluate</text>
  <text x="625" y="105" class="detail">task-specific</text>
  <text x="625" y="120" class="detail">scorer</text>

  <!-- Arrow -->
  <path d="M 680 100 L 710 100" class="arrow"/>

  <!-- Step 6 -->
  <rect x="710" y="60" width="110" height="80" rx="5" class="box"/>
  <text x="765" y="80" class="label">6. Result</text>
  <text x="765" y="100" class="detail">accuracy,</text>
  <text x="765" y="115" class="detail">cost, latency</text>

  <!-- Key insight box -->
  <rect x="10" y="200" width="810" height="140" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="3,3" rx="3"/>

  <text x="20" y="220" class="label" text-anchor="start">What Makes EntBench Different:</text>

  <text x="30" y="245" class="detail" text-anchor="start">✓ Live infrastructure: queries execute against real Postgres/MongoDB, not mocked data</text>
  <text x="30" y="265" class="detail" text-anchor="start">✓ Execution-based evaluation: verdict depends on actual DB result, not just LLM output</text>
  <text x="30" y="285" class="detail" text-anchor="start">✓ Fair cost accounting: for FrugalGPT, LLM-judge scorer cost is included in reported cost</text>
  <text x="30" y="305" class="detail" text-anchor="start">✓ Compounding error visible: ρ (rho) composition penalty measures planning errors across multi-step workflows</text>

</svg>