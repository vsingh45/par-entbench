[mypy]
python_version = 3.11
warn_return_any = False
warn_unused_configs = True
ignore_missing_imports = True

[mypy-entbench.evaluators.*]
ignore_errors = False

[mypy-par.planner]
ignore_errors = False

[mypy-par.dispatcher]
ignore_errors = False

# Suppress no-any-return for evaluators (intentional design)
[mypy-entbench.evaluators.sql_eval]
disable_error_code = no-any-return

[mypy-entbench.evaluators.sql_compose_eval]
disable_error_code = no-any-return

[mypy-entbench.evaluators.extract_eval]
disable_error_code = no-any-return

[mypy-entbench.evaluators.cross_recon_eval]
disable_error_code = no-any-return

[mypy-entbench.harness]
disable_error_code = no-any-return
